<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>النظام الشمسي التفاعلي – تعليمي متعدد اللغات</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            overflow: hidden;
            color: #fff;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* ----- GLASS UI ----- */
        .ui-glass {
            background: rgba(10, 14, 30, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        /* ----- TOP BAR ----- */
        #top-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 120;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            gap: 14px;
            min-width: 300px;
            max-width: 94vw;
            background: rgba(8, 12, 28, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            flex-wrap: wrap;
        }
        #top-bar .title {
            font-weight: 700;
            font-size: 1.0rem;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        #top-bar .title span {
            font-weight: 300;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            margin-left: 4px;
        }
        #lang-selector {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        #lang-selector button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }
        #lang-selector button:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        #lang-selector button.active {
            color: #fff;
            background: rgba(243, 156, 18, 0.25);
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.1);
        }

        /* ----- SIDEBAR (tree) ----- */
        #sidebar {
            position: fixed;
            top: 80px;
            left: 16px;
            z-index: 110;
            width: 240px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding: 14px 12px 12px 12px;
            background: rgba(8, 12, 28, 0.80);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #sidebar::-webkit-scrollbar {
            width: 4px;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        #sidebar-project-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #f9d976;
            letter-spacing: 0.02em;
            padding-bottom: 8px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #sidebar-project-title .icon {
            font-size: 1.1rem;
        }

        #sidebar-tree {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tree-planet {
            display: flex;
            align-items: center;
            padding: 5px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.8);
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid transparent;
        }
        .tree-planet:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .tree-planet.active {
            background: rgba(243, 156, 18, 0.15);
            color: #fff;
            border-left-color: #f39c12;
            box-shadow: inset 0 0 0 1px rgba(243, 156, 18, 0.15);
        }
        .tree-planet .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tree-planet .planet-label {
            flex: 1;
            font-weight: 500;
        }
        .tree-planet .badge {
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0 8px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        .tree-moon {
            display: flex;
            align-items: center;
            padding: 3px 8px 3px 32px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            gap: 8px;
            border-left: 1px dashed rgba(255, 255, 255, 0.06);
            margin-left: 14px;
        }
        .tree-moon:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }
        .tree-moon.active {
            background: rgba(243, 156, 18, 0.10);
            color: #fff;
            border-left-color: #f39c12;
        }
        .tree-moon .color-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tree-moon .moon-label {
            flex: 1;
            font-weight: 400;
        }
        .tree-moon .moon-icon {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-right: 2px;
        }

        /* ----- INFO PANEL ----- */
        #info-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 100;
            width: min(560px, 92vw);
            padding: 20px 24px;
            background: rgba(8, 12, 28, 0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 0.40s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }
        #info-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        #info-panel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        #info-panel .planet-name {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #info-panel .planet-name .sub {
            font-weight: 300;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }
        #info-panel .planet-color-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        #info-panel .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #info-panel .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        #info-panel .facts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 20px;
            margin: 8px 0 12px 0;
            font-size: 0.85rem;
        }
        #info-panel .facts .fact-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 3px 0;
        }
        #info-panel .facts .fact-item .label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        #info-panel .facts .fact-item .value {
            font-weight: 500;
        }
        #info-panel .fun-fact {
            font-size: 0.88rem;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid rgba(243, 156, 18, 0.4);
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }
        #info-panel .fun-fact::before {
            content: "✨ ";
            opacity: 0.5;
        }

        /* ----- CONTROLS ----- */
        #controls-bar {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 18px;
            background: rgba(8, 12, 28, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }
        #controls-bar input[type="range"] {
            width: 90px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            outline: none;
        }
        #controls-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f39c12;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.2);
        }
        #controls-bar .speed-label {
            min-width: 48px;
            text-align: center;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
        }
        #controls-bar .reset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 3px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
        }
        #controls-bar .reset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ----- TRACKING INDICATOR ----- */
        #tracking-indicator {
            position: fixed;
            bottom: 156px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 85;
            font-size: 0.7rem;
            color: rgba(243, 156, 18, 0.6);
            letter-spacing: 0.06em;
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 2px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(243, 156, 18, 0.15);
        }
        #tracking-indicator.visible {
            opacity: 1;
        }

        /* ----- HINT ----- */
        #hint {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 80;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.04em;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.8s;
            font-weight: 300;
        }
        #hint.hidden {
            opacity: 0;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 768px) {
            #sidebar {
                left: 8px;
                width: 190px;
                top: 74px;
                padding: 10px 8px;
                font-size: 0.7rem;
                max-height: calc(100vh - 180px);
            }
            #sidebar-project-title {
                font-size: 0.7rem;
            }
            .tree-planet {
                font-size: 0.7rem;
                padding: 4px 6px;
            }
            .tree-moon {
                font-size: 0.65rem;
                padding: 2px 6px 2px 24px;
                margin-left: 8px;
            }
            #info-panel {
                bottom: 12px;
                padding: 14px 16px;
                width: 94vw;
                border-radius: 18px;
            }
            #info-panel .planet-name {
                font-size: 1.2rem;
            }
            #info-panel .facts {
                grid-template-columns: 1fr;
                font-size: 0.75rem;
            }
            #controls-bar {
                bottom: 80px;
                padding: 6px 12px;
                gap: 8px;
                font-size: 0.65rem;
            }
            #controls-bar input[type="range"] {
                width: 60px;
            }
            #hint {
                bottom: 140px;
                font-size: 0.6rem;
            }
            #tracking-indicator {
                bottom: 130px;
                font-size: 0.6rem;
            }
            #top-bar {
                top: 10px;
                padding: 6px 14px;
                min-width: unset;
                width: 94vw;
                border-radius: 30px;
            }
            #top-bar .title {
                font-size: 0.85rem;
            }
            #lang-selector button {
                font-size: 0.55rem;
                padding: 2px 8px;
            }
        }
        @media (max-width: 480px) {
            #sidebar {
                display: none;
            }
            #info-panel .facts {
                grid-template-columns: 1fr 1fr;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BAR ===== -->
    <div id="top-bar">
        <div class="title">🪐 النظام الشمسي <span>· مستكشف</span></div>
        <div id="lang-selector"></div>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar" class="ui-glass">
        <div id="sidebar-project-title">
            <span class="icon">🌌</span>
            <span id="project-title-text">استكشاف النظام الشمسي</span>
        </div>
        <div id="sidebar-tree"></div>
    </div>

    <!-- ===== INFO PANEL ===== -->
    <div id="info-panel">
        <div class="panel-header">
            <div class="planet-name">
                <span class="planet-color-dot" id="p-color-dot"></span>
                <span id="p-name">الأرض</span>
                <span class="sub" id="p-name-en">Earth</span>
            </div>
            <button class="close-btn" id="panel-close">✕</button>
        </div>
        <div class="facts" id="p-facts"></div>
        <div class="fun-fact" id="p-funfact"></div>
    </div>

    <!-- ===== CONTROLS ===== -->
    <div id="controls-bar">
        <span>⏱</span>
        <input type="range" id="speed-slider" min="0" max="3" step="0.05" value="1" />
        <span class="speed-label" id="speed-label">1.0×</span>
        <button class="reset-btn" id="reset-view">⟲ إعادة</button>
    </div>

    <div id="tracking-indicator">✦ تتبع الكاميرا نشط ✦</div>
    <div id="hint">🌍 انقر أي كوكب أو قمر للتعلم · اسحب للدوران · مرر للتقريب</div>

    <!-- ===== THREE.JS ===== -->
    <div id="canvas-container"></div>

    <!-- ===== IMPORTS ===== -->

            }
        }
    </script>

        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xfdb813,
            emissive: 0xfdb813,
            emissiveIntensity: 2.5,
            roughness: 0.3,
            metalness: 0.0,
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.castShadow = true;
        scene.add(sun);

        // Sun glow
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = 512;
        glowCanvas.height = 512;
        const gCtx = glowCanvas.getContext('2d');
        const gradient = gCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
        gradient.addColorStop(0, 'rgba(255,220,150,1.0)');
        gradient.addColorStop(0.1, 'rgba(255,200,100,0.8)');
        gradient.addColorStop(0.4, 'rgba(255,160,50,0.4)');
        gradient.addColorStop(0.7, 'rgba(255,100,20,0.15)');
        gradient.addColorStop(1, 'rgba(255,50,0,0)');
        gCtx.fillStyle = gradient;
        gCtx.fillRect(0, 0, 512, 512);
        const glowTexture = new THREE.CanvasTexture(glowCanvas);

        const glowSprite = new THREE.Sprite(
            new THREE.SpriteMaterial({ map: glowTexture, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7 })
        );
        glowSprite.scale.set(16, 16, 1);
        scene.add(glowSprite);

        // ================================================================
        //  PLANETS & MOONS with REAL textures
        // ================================================================
        const planetObjects = [];
        const allClickables = [];

        function createLabel(text, offsetY = 0.5) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = '#fff';
            div.style.fontSize = '10px';
            div.style.fontWeight = '500';
            div.style.textShadow = '0 0 20px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8)';
            div.style.letterSpacing = '0.04em';
            div.style.background = 'rgba(0,0,0,0.4)';
            div.style.padding = '1px 8px';
            div.style.borderRadius = '10px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.border = '1px solid rgba(255,255,255,0.05)';
            div.style.fontFamily = "'Segoe UI', system-ui, sans-serif";
            div.style.pointerEvents = 'none';
            div.style.transition = 'opacity 0.3s';
            const label = new CSS2DObject(div);
            label.position.set(0, offsetY, 0);
            return label;
        }

        // Load textures and build planets
        PLANET_DATA.forEach((pData, idx) => {
            const size = pData.size;
            const texUrl = TEXTURE_URLS[pData.id];
            const texture = textureLoader.load(texUrl);

            const mat = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.6,
                metalness: 0.1,
                emissive: pData.color,
                emissiveIntensity: 0.03,
            });
            const geo = new THREE.SphereGeometry(size, 64, 64);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.id = pData.id;
            mesh.userData.type = 'planet';
            mesh.userData.planetId = pData.id;
            mesh.userData.size = size;
            const initAngle = (idx / PLANET_DATA.length) * Math.PI * 2;
            mesh.position.x = pData.orbit * Math.cos(initAngle);
            mesh.position.z = pData.orbit * Math.sin(initAngle);
            if (pData.tilt) {
                mesh.rotation.z = THREE.MathUtils.degToRad(pData.tilt);
            }
            scene.add(mesh);
            allClickables.push(mesh);

            // Label
            const labelDiv = document.createElement('div');
            labelDiv.textContent = pData.translations.en.name;
            labelDiv.style.color = '#fff';
            labelDiv.style.fontSize = '11px';
            labelDiv.style.fontWeight = '500';
            labelDiv.style.textShadow = '0 0 20px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8)';
            labelDiv.style.letterSpacing = '0.04em';
            labelDiv.style.background = 'rgba(0,0,0,0.4)';
            labelDiv.style.padding = '2px 10px';
            labelDiv.style.borderRadius = '12px';
            labelDiv.style.backdropFilter = 'blur(4px)';
            labelDiv.style.border = '1px solid rgba(255,255,255,0.06)';
            labelDiv.style.fontFamily = "'Segoe UI', system-ui, sans-serif";
            labelDiv.style.pointerEvents = 'none';
            labelDiv.style.transition = 'opacity 0.3s';
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, size + 0.5, 0);
            mesh.add(label);

            // Saturn rings with real texture
            if (pData.id === 'saturn') {
                const ringTex = textureLoader.load(TEXTURE_URLS.saturn_rings);
                const ringGeo = new THREE.RingGeometry(1.3, 2.4, 128);
                // Adjust UVs for ring texture
                const pos = ringGeo.attributes.position;
                const uv = ringGeo.attributes.uv;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    const dist = Math.sqrt(x * x + z * z);
                    uv.setXY(i, (dist - 1.3) / (2.4 - 1.3), 0.5);
                }
                const ringMat = new THREE.MeshStandardMaterial({
                    map: ringTex,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.85,
                    roughness: 0.9,
                    metalness: 0.0,
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.4;
                ring.position.y = 0;
                ring.receiveShadow = true;
                mesh.add(ring);
            }

            // Atmosphere glow for Earth and Venus
            if (pData.id === 'earth' || pData.id === 'venus') {
                const atmoGeo = new THREE.SphereGeometry(size * 1.02, 48, 48);
                const atmoMat = new THREE.MeshBasicMaterial({
                    color: pData.id === 'earth' ? 0x4488ff : 0xffaa66,
                    transparent: true,
                    opacity: 0.12,
                    side: THREE.BackSide,
                });
                const atmo = new THREE.Mesh(atmoGeo, atmoMat);
                mesh.add(atmo);
            }

            // Moons
            const moonMeshes = [];
            pData.moons.forEach((mData, mi) => {
                const mSize = mData.size;
                const mTexUrl = TEXTURE_URLS.moon; // Use moon texture for all moons (NASA moon map)
                const mTex = textureLoader.load(mTexUrl);
                const mMat = new THREE.MeshStandardMaterial({
                    map: mTex,
                    roughness: 0.8,
                    metalness: 0.0,
                    emissive: mData.color,
                    emissiveIntensity: 0.02,
                });
                const mGeo = new THREE.SphereGeometry(mSize, 32, 32);
                const mMesh = new THREE.Mesh(mGeo, mMat);
                mMesh.castShadow = true;
                mMesh.receiveShadow = true;
                mMesh.userData.id = mData.id;
                mMesh.userData.type = 'moon';
                mMesh.userData.planetId = pData.id;
                mMesh.userData.moonId = mData.id;
                mMesh.userData.size = mSize;
                mMesh.position.set(mData.orbitRadius, 0, 0);
                mesh.add(mMesh);
                allClickables.push(mMesh);

                const mLabelDiv = document.createElement('div');
                mLabelDiv.textContent = mData.translations.en.name;
                mLabelDiv.style.color = '#ccc';
                mLabelDiv.style.fontSize = '8px';
                mLabelDiv.style.fontWeight = '400';
                mLabelDiv.style.textShadow = '0 0 12px rgba(0,0,0,0.9)';
                mLabelDiv.style.background = 'rgba(0,0,0,0.3)';
                mLabelDiv.style.padding = '1px 6px';
                mLabelDiv.style.borderRadius = '8px';
                mLabelDiv.style.backdropFilter = 'blur(2px)';
                mLabelDiv.style.border = '1px solid rgba(255,255,255,0.04)';
                mLabelDiv.style.fontFamily = "'Segoe UI', system-ui, sans-serif";
                mLabelDiv.style.pointerEvents = 'none';
                const mLabel = new CSS2DObject(mLabelDiv);
                mLabel.position.set(0, mSize + 0.25, 0);
                mMesh.add(mLabel);

                moonMeshes.push({
                    mesh: mMesh,
                    data: mData,
                    label: mLabel,
                    labelDiv: mLabelDiv,
                    angle: (mi / pData.moons.length) * Math.PI * 2,
                    orbitRadius: mData.orbitRadius,
                    speed: mData.speed,
                });
            });

            planetObjects.push({
                id: pData.id,
                data: pData,
                mesh: mesh,
                label: label,
                labelDiv: labelDiv,
                angle: initAngle,
                orbitRadius: pData.orbit,
                speed: pData.speed,
                moons: moonMeshes,
            });
        });

        // ================================================================
        //  RAYCASTER
        // ================================================================
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function onPointerDown(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            pointer.set(x, y);

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(allClickables);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const id = hit.userData.id;
                const type = hit.userData.type;
                if (id) selectItem(id, type);
            }
        }

        renderer.domElement.addEventListener('click', onPointerDown);
        renderer.domElement.style.cursor = 'pointer';

        // ================================================================
        //  CAMERA ANIMATION
        // ================================================================
        const cameraAnim = {
            active: false,
            startTime: 0,
            duration: 1.4,
            startPos: new THREE.Vector3(),
            endPos: new THREE.Vector3(),
            startTarget: new THREE.Vector3(),
            endTarget: new THREE.Vector3(),
        };

        function cinematicEase(t) {
            if (t < 0.5) return 4 * t * t * t;
            const p = 2 * t - 2;
            return 1 - 0.5 * p * p * p * p * p;
        }

        function animateCameraTo(targetPos, targetLookAt) {
            cameraAnim.active = false;
            cameraAnim.startPos.copy(camera.position);
            cameraAnim.startTarget.copy(controls.target);
            cameraAnim.endPos.copy(targetPos);
            cameraAnim.endTarget.copy(targetLookAt);
            cameraAnim.startTime = performance.now();
            cameraAnim.active = true;
            document.getElementById('tracking-indicator').classList.add('visible');
            setTimeout(() => {
                if (!cameraAnim.active) document.getElementById('tracking-indicator').classList.remove('visible');
            }, cameraAnim.duration * 1000 + 400);
        }

        function cancelCameraAnimation() {
            if (cameraAnim.active) {
                cameraAnim.active = false;
                document.getElementById('tracking-indicator').classList.remove('visible');
            }
        }

        controls.addEventListener('start', () => {
            cancelCameraAnimation();
        });

        // ================================================================
        //  SELECTION
        // ================================================================
        function selectItem(id, type) {
            selectedItemId = id;
            selectedType = type;

            let planetData = null;
            let moonData = null;
            let targetMesh = null;
            let found = false;

            for (const p of planetObjects) {
                if (p.id === id && type === 'planet') {
                    planetData = p.data;
                    targetMesh = p.mesh;
                    found = true;
                    break;
                }
                for (const m of p.moons) {
                    if (m.mesh.userData.id === id && type === 'moon') {
                        moonData = m.data;
                        targetMesh = m.mesh;
                        found = true;
                        break;
                    }
                }
                if (found) break;
            }

            if (!found || !targetMesh) return;

            const worldPos = new THREE.Vector3();
            targetMesh.getWorldPosition(worldPos);
            let size = targetMesh.userData.size || 0.5;
            const distance = Math.max(size * 4.5 + 2.5, 3.5);
            const elevation = 0.45;
            const azimuth = Math.PI / 4.5;
            const camPos = new THREE.Vector3(
                worldPos.x + distance * Math.cos(elevation) * Math.sin(azimuth),
                worldPos.y + distance * Math.sin(elevation) + 0.3,
                worldPos.z + distance * Math.cos(elevation) * Math.cos(azimuth)
            );
            animateCameraTo(camPos, worldPos.clone());

            const lang = currentLang;
            let t;
            let nameEn;
            let color;
            let diameter, dist, period, moonsCount, fun;

            if (type === 'planet') {
                t = planetData.translations[lang] || planetData.translations.en;
                nameEn = planetData.translations.en.name;
                color = planetData.color;
                diameter = t.diameter;
                dist = t.distance;
                period = t.period;
                moonsCount = t.moons;
                fun = t.fun;
            } else {
                t = moonData.translations[lang] || moonData.translations.en;
                nameEn = moonData.translations.en.name;
                color = moonData.color;
                diameter = t.diameter || '—';
                dist = t.distance || '—';
                period = t.period || '—';
                moonsCount = '—';
                fun = t.fun || '—';
            }

            document.getElementById('p-name').textContent = t.name;
            document.getElementById('p-name-en').textContent = nameEn;
            document.getElementById('p-color-dot').style.background = '#' + color.toString(16).padStart(6, '0');

            const facts = document.getElementById('p-facts');
            facts.innerHTML = `
            <div class="fact-item"><span class="label">Diameter</span><span class="value">${diameter}</span></div>
            <div class="fact-item"><span class="label">Distance</span><span class="value">${dist}</span></div>
            <div class="fact-item"><span class="label">Orbital period</span><span class="value">${period}</span></div>
            ${type === 'planet' ? `<div class="fact-item"><span class="label">Moons</span><span class="value">${moonsCount}</span></div>` : ''}
          `;
            document.getElementById('p-funfact').textContent = fun;

            document.getElementById('info-panel').classList.add('visible');
            document.getElementById('hint').classList.add('hidden');

            updateSidebarActive(id);

            planetObjects.forEach(p => {
                p.mesh.material.emissiveIntensity = 0.03;
                p.moons.forEach(m => {
                    m.mesh.material.emissiveIntensity = 0.02;
                });
            });
            if (type === 'planet') {
                const p = planetObjects.find(p => p.id === id);
                if (p) p.mesh.material.emissiveIntensity = 0.6;
            } else {
                for (const p of planetObjects) {
                    for (const m of p.moons) {
                        if (m.mesh.userData.id === id) {
                            m.mesh.material.emissiveIntensity = 0.6;
                            p.mesh.material.emissiveIntensity = 0.2;
                            break;
                        }
                    }
                }
            }

            document.getElementById('tracking-indicator').classList.add('visible');
        }

        function deselectItem() {
            selectedItemId = null;
            selectedType = null;
            document.getElementById('info-panel').classList.remove('visible');
            document.getElementById('tracking-indicator').classList.remove('visible');
            planetObjects.forEach(p => {
                p.mesh.material.emissiveIntensity = 0.03;
                p.moons.forEach(m => {
                    m.mesh.material.emissiveIntensity = 0.02;
                });
            });
            updateSidebarActive(null);
            setTimeout(() => {
                if (!selectedItemId) {
                    document.getElementById('hint').classList.remove('hidden');
                }
            }, 1500);
        }

        document.getElementById('panel-close').addEventListener('click', deselectItem);

        // ================================================================
        //  SIDEBAR
        // ================================================================
        function buildSidebar() {
            const tree = document.getElementById('sidebar-tree');
            tree.innerHTML = '';
            const lang = currentLang;

            document.getElementById('project-title-text').textContent = PROJECT_TITLE[lang] || PROJECT_TITLE.en;

            planetObjects.forEach(p => {
                const pData = p.data;
                const t = pData.translations[lang] || pData.translations.en;

                const pDiv = document.createElement('div');
                pDiv.className = 'tree-planet';
                pDiv.dataset.id = p.id;
                pDiv.dataset.type = 'planet';
                pDiv.innerHTML = `
              <span class="color-dot" style="background:#${pData.color.toString(16).padStart(6,'0')};"></span>
              <span class="planet-label">${t.name}</span>
              <span class="badge">${pData.moons.length}</span>
            `;
                pDiv.addEventListener('click', () => {
                    selectItem(p.id, 'planet');
                });
                tree.appendChild(pDiv);

                p.moons.forEach(m => {
                    const mData = m.data;
                    const mt = mData.translations[lang] || mData.translations.en;
                    const mDiv = document.createElement('div');
                    mDiv.className = 'tree-moon';
                    mDiv.dataset.id = mData.id;
                    mDiv.dataset.type = 'moon';
                    mDiv.innerHTML = `
                <span class="color-dot" style="background:#${mData.color.toString(16).padStart(6,'0')};"></span>
                <span class="moon-icon">☾</span>
                <span class="moon-label">${mt.name}</span>
              `;
                    mDiv.addEventListener('click', () => {
                        selectItem(mData.id, 'moon');
                    });
                    tree.appendChild(mDiv);
                });
            });

            if (selectedItemId) {
                updateSidebarActive(selectedItemId);
            }
        }

        function updateSidebarActive(id) {
            document.querySelectorAll('#sidebar-tree .tree-planet, #sidebar-tree .tree-moon').forEach(el => {
                el.classList.toggle('active', el.dataset.id === id);
            });
        }

        // ================================================================
        //  LANGUAGE
        // ================================================================
        const langSelector = document.getElementById('lang-selector');
        LANG_CODES.forEach(code => {
            const btn = document.createElement('button');
            btn.textContent = LANG_NAMES[code] || code;
            btn.dataset.lang = code;
            if (code === currentLang) btn.classList.add('active');
            btn.addEventListener('click', () => {
                setLanguage(code);
            });
            langSelector.appendChild(btn);
        });

        function setLanguage(code) {
            currentLang = code;
            document.querySelectorAll('#lang-selector button').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === code);
            });

            planetObjects.forEach(p => {
                const t = p.data.translations[code] || p.data.translations.en;
                p.labelDiv.textContent = t.name;
                p.moons.forEach(m => {
                    const mt = m.data.translations[code] || m.data.translations.en;
                    m.labelDiv.textContent = mt.name;
                });
            });

            buildSidebar();

            if (selectedItemId && selectedType) {
                selectItem(selectedItemId, selectedType);
            }
        }

        // ================================================================
        //  SPEED
        // ================================================================
        const speedSlider = document.getElementById('speed-slider');
        const speedLabel = document.getElementById('speed-label');
        speedSlider.addEventListener('input', () => {
            orbitSpeed = parseFloat(speedSlider.value);
            speedLabel.textContent = orbitSpeed.toFixed(1) + '×';
        });

        // ================================================================
        //  RESET VIEW
        // ================================================================
        document.getElementById('reset-view').addEventListener('click', () => {
            const resetPos = new THREE.Vector3(18, 14, 28);
            const resetTarget = new THREE.Vector3(0, 0, 0);
            animateCameraTo(resetPos, resetTarget);
            setTimeout(() => {
                deselectItem();
            }, 200);
        });

        // ================================================================
        //  RESIZE
        // ================================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            labelRenderer.setSize(w, h);
        });

        // ================================================================
        //  ANIMATION LOOP
        // ================================================================
        function animate() {
            const delta = clock.getDelta();
            time += delta * orbitSpeed;

            if (cameraAnim.active) {
                const elapsed = (performance.now() - cameraAnim.startTime) / 1000;
                let t = Math.min(elapsed / cameraAnim.duration, 1);
                const ease = cinematicEase(t);
                camera.position.lerpVectors(cameraAnim.startPos, cameraAnim.endPos, ease);
                controls.target.lerpVectors(cameraAnim.startTarget, cameraAnim.endTarget, ease);
                if (t >= 1) {
                    cameraAnim.active = false;
                    camera.position.copy(cameraAnim.endPos);
                    controls.target.copy(cameraAnim.endTarget);
                    document.getElementById('tracking-indicator').classList.remove('visible');
                }
            }

            if (selectedItemId && selectedType) {
                let targetMesh = null;
                for (const p of planetObjects) {
                    if (p.id === selectedItemId && selectedType === 'planet') {
                        targetMesh = p.mesh;
                        break;
                    }
                    for (const m of p.moons) {
                        if (m.mesh.userData.id === selectedItemId && selectedType === 'moon') {
                            targetMesh = m.mesh;
                            break;
                        }
                    }
                    if (targetMesh) break;
                }
                if (targetMesh) {
                    const worldPos = new THREE.Vector3();
                    targetMesh.getWorldPosition(worldPos);
                    controls.target.lerp(worldPos, 0.08);
                    document.getElementById('tracking-indicator').classList.add('visible');
                }
            }

            sun.rotation.y += delta * 0.08;
            glowSprite.material.rotation += delta * 0.02;

            planetObjects.forEach(p => {
                const angle = p.angle + time * p.speed * 0.3;
                p.mesh.position.x = p.orbitRadius * Math.cos(angle);
                p.mesh.position.z = p.orbitRadius * Math.sin(angle);
                p.mesh.rotation.y += delta * 0.4;

                p.moons.forEach(m => {
                    const mAngle = m.angle + time * m.speed * 0.5;
                    m.mesh.position.x = m.orbitRadius * Math.cos(mAngle);
                    m.mesh.position.z = m.orbitRadius * Math.sin(mAngle);
                    m.mesh.rotation.y += delta * 0.3;
                });
            });

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // ================================================================
        //  KEYBOARD
        // ================================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') deselectItem();
            if (e.key === 'r' || e.key === 'R') {
                document.getElementById('reset-view').click();
            }
        });

        // ================================================================
        //  INIT
        // ================================================================
        buildSidebar();

        setTimeout(() => {
            selectItem('earth', 'planet');
        }, 700);

        console.log('🪐 Solar System with REAL NASA textures!');
        console.log(`🌍 ${LANG_CODES.length} languages. Photorealistic quality.`);
    </script>
</body>
</html>
