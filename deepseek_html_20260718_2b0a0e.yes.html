<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌍 محاكاة الفضاء - إضاءة واقعية من الشمس</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 18px;
            gap: 16px;
            transition: opacity 0.8s;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(100,200,255,0.1);
            border-top-color: #6af;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading.hidden { opacity: 0; pointer-events: none; }
        
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            padding: 10px 28px;
            border-radius: 50px;
            border: 1px solid rgba(100,180,255,0.25);
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            letter-spacing: 0.5px;
            box-shadow: 0 0 60px rgba(50,150,255,0.1);
            white-space: nowrap;
        }
        #info span { color: #6af; }
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(150,200,255,0.6);
            font-size: 11px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(100,180,255,0.1);
            z-index: 100;
            font-family: 'Courier New', monospace;
            pointer-events: none;
        }
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(150,200,255,0.5);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 22px;
            border-radius: 40px;
            border: 1px solid rgba(100,180,255,0.1);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }
        .controls-panel {
            position: absolute;
            bottom: 100px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .ctrl-btn {
            background: rgba(0,10,30,0.85);
            backdrop-filter: blur(12px);
            color: #8ac;
            border: 1px solid rgba(100,180,255,0.15);
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            justify-content: center;
        }
        .ctrl-btn:hover {
            transform: scale(1.05);
            background: rgba(20,60,140,0.8);
            border-color: #6af;
            color: #fff;
            box-shadow: 0 0 30px rgba(100,180,255,0.15);
        }
        .ctrl-btn .icon { font-size: 16px; }
        .ctrl-btn.active {
            border-color: #6af;
            background: rgba(30,80,180,0.3);
        }
        @media (max-width: 768px) {
            #info { font-size: 11px; padding: 6px 14px; top: 12px; white-space: normal; width: 90%; }
            #controls-hint { font-size: 10px; padding: 5px 12px; white-space: normal; width: 85%; text-align: center; bottom: 15px; }
            .controls-panel { right: 10px; bottom: 70px; gap: 8px; }
            .ctrl-btn { padding: 7px 12px; font-size: 10px; min-width: 85px; }
            #stats { display: none; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div>🌍 جاري تحميل الصور عالية الدقة...</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.4);">قد يستغرق الأمر بضع ثوانٍ حسب سرعة الإنترنت</div>
</div>

<div id="info">☀️ <span>إضاءة واقعية من الشمس</span> · مصدر ضوء واحد</div>
<div id="stats">FPS: <span id="fps">0</span></div>
<div id="controls-hint">🖱️ اسحب للتدوير · تمرير للزوم العميق</div>
<div class="controls-panel">
    <button class="ctrl-btn active" id="toggleAutoRotate"><span class="icon">🔄</span> دوران تلقائي</button>
    <button class="ctrl-btn active" id="toggleClouds"><span class="icon">☁️</span> الغيوم</button>
    <button class="ctrl-btn active" id="toggleAtmosphere"><span class="icon">🌐</span> الغلاف الجوي</button>
    <button class="ctrl-btn" id="resetCamera"><span class="icon">🎯</span> إعادة الكاميرا</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

// --- عناصر التحميل ---
const loadingEl = document.getElementById('loading');

// --- المشهد ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

// --- الكاميرا ---
const camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.01, 500);
camera.position.set(0, 0.5, 6.5);

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance",
    stencil: false,
    depth: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// --- OrbitControls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.4;
controls.zoomSpeed = 1.8;
controls.minDistance = 0.35;
controls.maxDistance = 35;
controls.target.set(0, 0, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.update();

// --- EffectComposer ---
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.4, 0.5, 0.12
);
composer.addPass(bloomPass);

const fxaaPass = new ShaderPass(FXAAShader);
fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
composer.addPass(fxaaPass);

// ================================================================
//  الإضاءة الواقعية - الشمس هي المصدر الوحيد للضوء
// ================================================================

// 1. إضاءة محيطية خافتة جداً لتظهر التفاصيل في الظل (محاكاة انعكاس ضوء النجوم)
const ambient = new THREE.AmbientLight(0x224466, 0.15);
scene.add(ambient);

// 2. ضوء الشمس الاتجاهي - يأتي من موقع الشمس إلى الأرض
// سنقوم بتحديد موقع الشمس أولاً (سننشئها لاحقاً) ولكننا سنضع الضوء في نفس الموقع
// سنستخدم مجموعة الشمس لاحقاً، لكننا سننشئ الضوء الآن مع موقعه الثابت
const sunPosition = new THREE.Vector3(-7, 0.3, -4);

// ضوء اتجاهي من الشمس إلى الأرض
const sunLight = new THREE.DirectionalLight(0xffeedd, 3.0);
sunLight.position.copy(sunPosition);
sunLight.target.position.set(0, 0, 0);
scene.add(sunLight.target);
scene.add(sunLight);

// إضافة PointLight صغير في موقع الشمس لإضاءة موضعية إضافية (تأثير وهج)
const sunPointLight = new THREE.PointLight(0xffaa44, 0.5, 20);
sunPointLight.position.copy(sunPosition);
scene.add(sunPointLight);

// لا نضيف أي إضاءات أخرى (لا fill, rim, top, hemisphere) للحفاظ على واقعية مصدر ضوء واحد

// ================================================================
//  تحميل النسيج من الإنترنت (صور حقيقية عالية الدقة)
// ================================================================
const textureLoader = new THREE.TextureLoader();
let texturesLoaded = 0;
const totalTextures = 6;

function onTextureProgress() {
    texturesLoaded++;
    if (texturesLoaded >= totalTextures) {
        loadingEl.classList.add('hidden');
        setTimeout(() => loadingEl.style.display = 'none', 500);
    }
}

// --- الأرض ---
const earthMat = new THREE.MeshPhysicalMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', onTextureProgress),
    emissiveMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_lights_2048.png', onTextureProgress),
    emissive: new THREE.Color(0x112244),
    emissiveIntensity: 0.3,
    specularMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg', onTextureProgress),
    specularIntensity: 0.6,
    roughnessMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg'),
    roughness: 0.3,
    metalness: 0.05,
    normalMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg', onTextureProgress),
    normalScale: new THREE.Vector2(2.0, 2.0),
    clearcoat: 0.25,
    clearcoatRoughness: 0.2,
    envMapIntensity: 1.2,
    reflectivity: 0.4
});
const earthGeo = new THREE.SphereGeometry(2, 256, 256);
const earth = new THREE.Mesh(earthGeo, earthMat);
earth.castShadow = true;
earth.receiveShadow = true;
scene.add(earth);

// --- الغيوم ---
const cloudMat = new THREE.MeshPhysicalMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png', onTextureProgress),
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false,
    roughness: 0.1,
    metalness: 0.0,
    envMapIntensity: 0.6
});
const cloudGeo = new THREE.SphereGeometry(2.02, 128, 128);
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

// --- الغلاف الجوي (Rim Light) ---
const atmoMat = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPos;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPos;
        void main() {
            vec3 viewDir = normalize(-vPos);
            float rim = 1.0 - max(0.0, dot(viewDir, vNormal));
            float intensity = pow(rim, 3.0);
            vec3 color = mix(vec3(0.2, 0.5, 0.8), vec3(0.4, 0.7, 1.0), intensity);
            gl_FragColor = vec4(color, intensity * 0.7);
        }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.FrontSide,
    transparent: true,
    depthWrite: false
});
const atmoGeo = new THREE.SphereGeometry(2.18, 64, 64);
const atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
scene.add(atmosphere);

// --- طبقة الأوزون ---
const ozoneMat = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        void main() {
            float intensity = pow(0.5 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
            gl_FragColor = vec4(0.1, 0.2, 0.8, intensity * 0.15);
        }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.FrontSide,
    transparent: true,
    depthWrite: false
});
const ozoneGeo = new THREE.SphereGeometry(2.25, 64, 64);
const ozone = new THREE.Mesh(ozoneGeo, ozoneMat);
scene.add(ozone);

// --- القمر ---
const moonMat = new THREE.MeshPhysicalMaterial({
    map: textureLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg', onTextureProgress),
    roughness: 0.98,
    metalness: 0.02,
    color: 0xcccccc,
    emissive: new THREE.Color(0x111122),
    emissiveIntensity: 0.05
});
const moonGeo = new THREE.SphereGeometry(0.5, 128, 128);
const moon = new THREE.Mesh(moonGeo, moonMat);
moon.castShadow = true;
scene.add(moon);
moon.position.set(4.0, 0.15, 2.8);

// --- الشمس (جسم مضيء) ---
const sunGroup = new THREE.Group();
sunGroup.position.copy(sunPosition);

// قلب الشمس
const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 64, 64),
    new THREE.MeshBasicMaterial({ color: 0xffaa44 })
);
sunGroup.add(core);

// توهج داخلي
const innerGlow = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xff8833, transparent: true, opacity: 0.3 })
);
sunGroup.add(innerGlow);

// توهج متوسط
const midGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xff6622, transparent: true, opacity: 0.15 })
);
sunGroup.add(midGlow);

// توهج خارجي
const outerGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xff4411, transparent: true, opacity: 0.05 })
);
sunGroup.add(outerGlow);

// تاج الشمس
const corona = new THREE.Mesh(
    new THREE.SphereGeometry(2.5, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.02 })
);
sunGroup.add(corona);

scene.add(sunGroup);

// --- نجوم ---
function createDeepStars() {
    const count = 12000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const r = 40 + Math.random() * 70;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);
        const type = Math.random();
        if (type < 0.15) {
            colors[i*3] = 0.3 + Math.random()*0.3;
            colors[i*3+1] = 0.4 + Math.random()*0.3;
            colors[i*3+2] = 1.0;
        } else if (type < 0.3) {
            colors[i*3] = 1.0;
            colors[i*3+1] = 0.2 + Math.random()*0.3;
            colors[i*3+2] = 0.1 + Math.random()*0.2;
        } else if (type < 0.5) {
            colors[i*3] = 1.0;
            colors[i*3+1] = 0.6 + Math.random()*0.4;
            colors[i*3+2] = 0.2 + Math.random()*0.2;
        } else {
            colors[i*3] = 0.7 + Math.random()*0.3;
            colors[i*3+1] = 0.7 + Math.random()*0.3;
            colors[i*3+2] = 0.7 + Math.random()*0.3;
        }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
        size: 0.12,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });
    return new THREE.Points(geo, mat);
}
const stars = createDeepStars();
scene.add(stars);

// --- سديم ---
function createAdvancedNebula() {
    const count = 3000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const r = 20 + Math.random() * 35;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.25;
        positions[i*3+2] = r * Math.cos(phi);
        colors[i*3] = 0.2 + Math.random() * 0.3;
        colors[i*3+1] = 0.1 + Math.random() * 0.2;
        colors[i*3+2] = 0.5 + Math.random() * 0.4;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });
    return new THREE.Points(geo, mat);
}
const nebula = createAdvancedNebula();
scene.add(nebula);

// --- التحكم بالأزرار ---
let cloudsVisible = true;
let atmosphereVisible = true;

document.getElementById('toggleAutoRotate').addEventListener('click', function() {
    controls.autoRotate = !controls.autoRotate;
    this.classList.toggle('active');
    this.innerHTML = controls.autoRotate ? 
        '<span class="icon">⏸️</span> إيقاف الدوران' : 
        '<span class="icon">🔄</span> دوران تلقائي';
});

document.getElementById('toggleClouds').addEventListener('click', function() {
    cloudsVisible = !cloudsVisible;
    clouds.visible = cloudsVisible;
    this.classList.toggle('active');
    this.innerHTML = cloudsVisible ? 
        '<span class="icon">☁️</span> الغيوم: ظاهرة' : 
        '<span class="icon">☁️</span> الغيوم: مخفية';
});

document.getElementById('toggleAtmosphere').addEventListener('click', function() {
    atmosphereVisible = !atmosphereVisible;
    atmosphere.visible = atmosphereVisible;
    ozone.visible = atmosphereVisible;
    this.classList.toggle('active');
    this.innerHTML = atmosphereVisible ? 
        '<span class="icon">🌐</span> الغلاف: نشط' : 
        '<span class="icon">🌐</span> الغلاف: معطل';
});

document.getElementById('resetCamera').addEventListener('click', () => {
    camera.position.set(0, 0.5, 6.5);
    controls.target.set(0, 0, 0);
    controls.update();
});

// --- FPS ---
let frameCount = 0;
let lastFpsUpdate = performance.now();
const fpsElement = document.getElementById('fps');

// --- حلقة التشغيل ---
function animate() {
    requestAnimationFrame(animate);

    const time = performance.now() * 0.001;

    // FPS
    frameCount++;
    if (time - lastFpsUpdate > 0.5) {
        fpsElement.textContent = Math.round(frameCount / (time - lastFpsUpdate) * 1000);
        frameCount = 0;
        lastFpsUpdate = time;
    }

    // دوران الأرض
    earth.rotation.y += 0.002;
    clouds.rotation.y += 0.0025;
    atmosphere.rotation.y += 0.0008;
    ozone.rotation.y += 0.0006;

    // مدار القمر
    const moonSpeed = 0.1;
    const angle = time * moonSpeed;
    const dist = 4.0 + Math.sin(time * 0.012) * 0.4;
    moon.position.x = dist * Math.cos(angle);
    moon.position.z = dist * Math.sin(angle);
    moon.position.y = 0.1 + Math.sin(time * 0.07) * 0.12;
    moon.rotation.y += 0.006;
    moon.rotation.x = Math.sin(time * 0.04) * 0.02;

    // الشمس - نبض خفيف
    sunGroup.rotation.y += 0.0005;
    const pulse = 1 + Math.sin(time * 0.4) * 0.025;
    sunGroup.children.forEach(c => {
        if (c.isMesh) c.scale.set(pulse, pulse, pulse);
    });

    // النجوم
    stars.rotation.y += 0.00002;
    stars.rotation.x = Math.sin(time * 0.000005) * 0.002;
    nebula.rotation.y += 0.00003;

    controls.update();
    composer.render();
}

animate();

// --- تغيير الحجم ---
window.addEventListener('resize', () => {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    fxaaPass.uniforms['resolution'].value.set(1 / w, 1 / h);
});

console.log('☀️ إضاءة واقعية: الشمس هي المصدر الوحيد للضوء!');
</script>
</body>
</html>
